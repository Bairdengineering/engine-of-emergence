<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Engine of Emergence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#020408;font-family:'Cormorant Garamond',Georgia,serif;color:rgba(255,255,255,.92)}
    .sf{position:fixed;inset:0;z-index:0;overflow:hidden}
    .st{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d) ease-in-out infinite var(--dl)}
    @keyframes tw{0%,100%{opacity:var(--a)}50%{opacity:var(--b);transform:scale(1.3)}}
    .scene{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .9s}
    .tb{position:absolute;top:4vh;left:0;right:0;text-align:center;animation:fd 1.8s cubic-bezier(.16,1,.3,1) .6s forwards;opacity:0}
    @keyframes fd{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
    .eb{font-family:'Cinzel',serif;font-size:clamp(9px,1.8vw,13px);letter-spacing:.35em;color:rgba(46,125,142,.7);text-transform:uppercase;margin-bottom:6px}
    .tt{font-family:'Cinzel',serif;font-size:clamp(22px,4.5vw,52px);font-weight:500;letter-spacing:.12em;text-shadow:0 0 40px rgba(46,125,142,.4)}
    .pw{position:relative;width:min(84vw,84vh);height:min(84vw,84vh);animation:fi 2.4s cubic-bezier(.16,1,.3,1) forwards;opacity:0;cursor:pointer}
    @keyframes fi{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:none}}
    .gl{position:absolute;inset:-18%;border-radius:50%;background:radial-gradient(circle,rgba(26,107,74,.18) 0%,rgba(46,125,142,.12) 35%,transparent 70%);animation:br 6s ease-in-out infinite;transition:all .6s}
    .pw:hover .gl{background:radial-gradient(circle,rgba(26,107,74,.38) 0%,rgba(46,125,142,.28) 35%,transparent 70%)}
    @keyframes br{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.07);opacity:1}}
    .am{position:absolute;inset:-3.5%;border-radius:50%;background:radial-gradient(circle at 40% 35%,transparent 46%,rgba(74,143,160,.2) 50%,rgba(46,125,142,.07) 62%,transparent 68%);animation:sp 45s linear infinite}
    .pr{position:absolute;inset:-2%;border-radius:50%;border:1px solid transparent;animation:pu 4.5s ease-out infinite;pointer-events:none}
    .pr:nth-child(3){animation-delay:1.5s}.pr:nth-child(4){animation-delay:3s}
    @keyframes sp{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes pu{0%{transform:scale(1);border-color:rgba(46,125,142,.45);opacity:1}100%{transform:scale(1.3);border-color:transparent;opacity:0}}
    .pl{position:relative;width:100%;height:100%;border-radius:50%;overflow:hidden;box-shadow:inset -16% -10% 0 rgba(2,4,8,.9),0 0 80px rgba(26,107,74,.2),0 0 160px rgba(46,125,142,.08);transition:box-shadow .6s}
    .pw:hover .pl{box-shadow:inset -16% -10% 0 rgba(2,4,8,.9),0 0 120px rgba(26,107,74,.36),0 0 240px rgba(46,125,142,.18)}
    canvas{position:absolute;inset:0;width:100%;height:100%}
    .cl{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(ellipse 42% 8% at 55% 18%,rgba(255,255,255,.13) 0%,transparent 60%),radial-gradient(ellipse 32% 5% at 20% 44%,rgba(255,255,255,.10) 0%,transparent 58%),radial-gradient(ellipse 26% 5% at 80% 52%,rgba(255,255,255,.09) 0%,transparent 55%),radial-gradient(ellipse 38% 6% at 42% 68%,rgba(255,255,255,.08) 0%,transparent 55%);animation:sp 70s linear infinite reverse}
    .lf{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 40% 38%,rgba(46,160,100,.08) 0%,transparent 52%);animation:lp 5s ease-in-out infinite}
    @keyframes lp{0%,100%{opacity:.5}50%{opacity:1}}
    .sh{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 80% 55%,transparent 26%,rgba(2,4,8,.28) 48%,rgba(2,4,8,.72) 66%,rgba(2,4,8,.96) 82%)}
    .sp2{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 26% 18% at 26% 24%,rgba(255,255,255,.07) 0%,transparent 70%)}
    .pm{position:absolute;bottom:-46px;left:0;right:0;text-align:center;font-style:italic;font-size:clamp(11px,1.6vw,14px);letter-spacing:.1em;color:rgba(255,255,255,0);pointer-events:none;transition:color .5s;animation:pin 1.2s ease 5s forwards}
    @keyframes pin{to{color:rgba(255,255,255,.28)}}
    .pw:hover .pm{color:rgba(255,255,255,.52)!important}
    .ln{position:absolute;bottom:-72px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:clamp(9px,1.4vw,12px);letter-spacing:.45em;color:rgba(46,125,142,0);text-transform:uppercase;pointer-events:none;animation:lin 1.5s ease 5.5s forwards}
    @keyframes lin{to{color:rgba(46,125,142,.42)}}
    .ov{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(2,4,8,.94);opacity:0;pointer-events:none;transition:opacity .7s}
    .ov.on{opacity:1;pointer-events:all}
    .ot{font-family:'Cinzel',serif;font-size:clamp(13px,2.2vw,20px);letter-spacing:.22em;color:rgba(255,255,255,.62);text-transform:uppercase;margin-bottom:48px}
    .ob{display:flex;flex-direction:column;gap:18px;align-items:center}
    .bn{font-family:'Cinzel',serif;font-size:clamp(10px,1.5vw,13px);letter-spacing:.2em;text-transform:uppercase;padding:16px 44px;border-radius:2px;cursor:pointer;transition:all .35s;min-width:320px;text-align:center;background:transparent}
    .bp{border:1px solid rgba(46,125,142,.65);color:rgba(74,143,160,.9)}
    .bp:hover{border-color:rgba(46,125,142,1);color:#fff;box-shadow:0 0 28px rgba(46,125,142,.28)}
    .bs{border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.42)}
    .bs:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.8)}
    .bk{margin-top:40px;font-style:italic;font-size:13px;letter-spacing:.05em;color:rgba(255,255,255,.22);cursor:pointer;transition:color .3s;background:none;border:none}
    .bk:hover{color:rgba(255,255,255,.5)}
    .eq{position:fixed;bottom:20px;right:24px;font-style:italic;font-size:clamp(11px,1.4vw,14px);letter-spacing:.04em;color:rgba(46,125,142,.28);animation:ein 2s ease 6s forwards;opacity:0;user-select:none;transition:color .4s;z-index:2}
    @keyframes ein{to{opacity:1}}
    .eq:hover{color:rgba(46,125,142,.7)}
    @media(max-width:480px){.bn{min-width:260px;padding:14px 28px}}
  </style>
</head>
<body>
<div class="sf" id="sf"></div>
<div class="scene" id="scene">
  <div class="tb"><div class="eb">A Framework for Everything</div><div class="tt">Engine of Emergence</div></div>
  <div class="pw" id="pw">
    <div class="gl"></div><div class="am"></div>
    <div class="pr"></div><div class="pr"></div><div class="pr"></div>
    <div class="pl">
      <!-- Single canvas — map + face drawn together, full control -->
      <canvas id="c"></canvas>
      <div class="cl"></div><div class="lf"></div><div class="sh"></div><div class="sp2"></div>
    </div>
    <div class="pm">touch to begin</div>
    <div class="ln">Lambda</div>
  </div>
</div>
<div class="ov" id="ov">
  <div class="ot">Where would you like to begin?</div>
  <div class="ob">
    <button class="bn bp" id="bJ">Take Me on the Journey</button>
    <button class="bn bs" id="bE">I Know Where I Want to Start</button>
  </div>
  <button class="bk" id="bB">return to Lambda</button>
</div>
<div class="eq">χs &gt; λ</div>

<script>
// ── STARFIELD ─────────────────────────────────────────
const sf=document.getElementById('sf');
for(let i=0;i<300;i++){
  const s=document.createElement('div');s.classList.add('st');
  const z=Math.random()*2.2+0.3;
  s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*5+3).toFixed(1)}s;--dl:-${(Math.random()*8).toFixed(1)}s;--a:${(Math.random()*.15+.04).toFixed(2)};--b:${(Math.random()*.5+.35).toFixed(2)};`;
  sf.appendChild(s);
}

// ── CANVAS SETUP ──────────────────────────────────────
const cvs = document.getElementById('c');
const S = 500;
cvs.width = S; cvs.height = S;
const ctx = cvs.getContext('2d');

// ── BLINK STATE ───────────────────────────────────────
// lidProgress: 0 = resting (lids slightly drooped), 1 = fully closed
let lidProgress = 0;
let blinkState = 'idle'; // idle | closing | holding | opening
let blinkT = 0;
const BLINK_CLOSE = 180, BLINK_HOLD = 80, BLINK_OPEN = 220;

// Eye geometry (in 500x500 space)
const EYES = [
  { cx: 148, cy: 215 },
  { cx: 352, cy: 215 }
];
const EYE_RX = 56; // almond half-width
const EYE_RY = 30; // almond half-height
const UPPER_REST = 0.28; // lid covers 28% of eye height at rest
const LOWER_REST = 0.18;

// ── DRAW FUNCTION ─────────────────────────────────────
// ── FACE DRAWING ──────────────────────────────────────
function drawFace(lp) {
  // lp = lid progress: 0 = resting droop, 1 = fully closed

  EYES.forEach(eye => {
    drawEye(eye.cx, eye.cy, lp);
  });

  // Mouth — gentle closed smile
  ctx.beginPath();
  ctx.moveTo(200, 322);
  ctx.quadraticCurveTo(250, 342, 300, 322);
  ctx.strokeStyle = 'rgba(6,20,14,0.38)';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.stroke();
  // Corner lifts
  ctx.beginPath();
  ctx.moveTo(197,321); ctx.quadraticCurveTo(190,312,194,304);
  ctx.moveTo(303,321); ctx.quadraticCurveTo(310,312,306,304);
  ctx.strokeStyle='rgba(6,20,14,0.22)'; ctx.lineWidth=2.2; ctx.stroke();
}

function drawEye(cx, cy, lp) {
  const rx = EYE_RX, ry = EYE_RY;

  // Lid heights
  const upperClosed = ry * 2;
  const lowerClosed = ry * 2;
  const upperH = ry * 2 * UPPER_REST + (upperClosed - ry * 2 * UPPER_REST) * lp;
  const lowerH = ry * 2 * LOWER_REST + (lowerClosed - ry * 2 * LOWER_REST) * lp;

  // How much of the eye is visible (the gap between lids)
  const topOfEye = cy - ry;
  const botOfEye = cy + ry;
  const lidTop = topOfEye + upperH;     // where upper lid ends
  const lidBot = botOfEye - lowerH;     // where lower lid starts

  // 1. Draw almond clip region
  ctx.save();
  ctx.beginPath();
  eyeAlmond(ctx, cx, cy, rx, ry);
  ctx.clip();

  // 2. Sclera (white of eye)
  ctx.beginPath();
  eyeAlmond(ctx, cx, cy, rx, ry);
  ctx.fillStyle = 'rgba(228,244,255,0.95)';
  ctx.fill();

  // 3. Iris — only if some of it is visible
  const irisR = 26;
  const irisCy = cy + 4; // slightly lower for natural look
  ctx.beginPath();
  ctx.arc(cx, irisCy, irisR, 0, Math.PI*2);
  const ig = ctx.createRadialGradient(cx-6,irisCy-8,2,cx,irisCy,irisR);
  ig.addColorStop(0,'rgba(240,250,255,0.98)');
  ig.addColorStop(0.4,'rgba(185,225,250,0.95)');
  ig.addColorStop(1,'rgba(100,170,210,0.90)');
  ctx.fillStyle = ig; ctx.fill();

  // 4. Pupil
  ctx.beginPath();
  ctx.arc(cx, irisCy, 12, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(2,6,12,0.97)'; ctx.fill();

  // 5. Highlight
  ctx.beginPath();
  ctx.arc(cx-9, irisCy-9, 5.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fill();
  ctx.beginPath();
  ctx.arc(cx+7, irisCy+7, 2.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(210,238,255,0.60)'; ctx.fill();

  // 6. UPPER LID — slides down from top of almond
  ctx.fillStyle = 'rgba(6,14,10,0.92)';
  ctx.fillRect(cx - rx - 4, topOfEye, (rx+4)*2, upperH);

  // 7. LOWER LID — slides up from bottom of almond
  ctx.fillStyle = 'rgba(6,14,10,0.80)';
  ctx.fillRect(cx - rx - 4, botOfEye - lowerH, (rx+4)*2, lowerH);

  ctx.restore(); // removes almond clip

  // 8. LASHES — drawn outside clip, rooted at upper lid edge, move with lid
  // Root y position tracks the lid
  const lashRootY = topOfEye + upperH;
  const lashOffsets = [
    { dx: -rx+4,  angle: -115, len: 22 },
    { dx: -rx+18, angle: -100, len: 24 },
    { dx: -rx+32, angle: -92,  len: 25 },
    { dx: 0,      angle: -90,  len: 26 },
    { dx: rx-32,  angle: -88,  len: 25 },
    { dx: rx-18,  angle: -80,  len: 24 },
    { dx: rx-4,   angle: -65,  len: 22 },
  ];
  ctx.lineCap = 'round';
  lashOffsets.forEach((l, i) => {
    const lx = cx + l.dx;
    const ly = lashRootY;
    // Find actual y on the almond at this x
    const almondY = almondTopY(cx, cy, rx, ry, lx);
    const rootY = almondY + upperH * 0.6; // lash roots along lid edge
    const rad = l.angle * Math.PI / 180;
    const ex = lx + Math.cos(rad) * l.len;
    const ey = rootY + Math.sin(rad) * l.len;
    ctx.beginPath();
    ctx.moveTo(lx, rootY);
    ctx.quadraticCurveTo(lx + Math.cos(rad)*l.len*0.5, rootY + Math.sin(rad)*l.len*0.5 - 4, ex, ey);
    ctx.strokeStyle = `rgba(5,14,10,${0.75 - i*0.04})`;
    ctx.lineWidth = 3.2 - i*0.15;
    ctx.stroke();
  });

  // 9. BROW — soft arc above eye, fixed position
  const browY = cy - ry - 22;
  ctx.beginPath();
  ctx.moveTo(cx - rx - 10, browY + 8);
  ctx.quadraticCurveTo(cx, browY - 8, cx + rx + 10, browY + 8);
  ctx.strokeStyle = 'rgba(5,14,10,0.28)';
  ctx.lineWidth = 12;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.strokeStyle = 'rgba(5,14,10,0.22)';
  ctx.lineWidth = 6;
  ctx.stroke();

  // Ambient glow behind eye
  const glow = ctx.createRadialGradient(cx,cy,0,cx,cy,rx+20);
  glow.addColorStop(0,'rgba(160,220,255,0.14)');
  glow.addColorStop(1,'rgba(160,220,255,0)');
  ctx.beginPath(); ctx.arc(cx,cy,rx+20,0,Math.PI*2);
  ctx.fillStyle=glow; ctx.fill();
}

// Draw an eye almond path (pointed at corners, wider in middle)
function eyeAlmond(ctx, cx, cy, rx, ry) {
  ctx.moveTo(cx - rx, cy);
  ctx.bezierCurveTo(cx - rx, cy - ry*1.1, cx - rx*0.3, cy - ry, cx, cy - ry*0.85);
  ctx.bezierCurveTo(cx + rx*0.3, cy - ry, cx + rx, cy - ry*1.1, cx + rx, cy);
  ctx.bezierCurveTo(cx + rx, cy + ry*1.1, cx + rx*0.3, cy + ry, cx, cy + ry*0.85);
  ctx.bezierCurveTo(cx - rx*0.3, cy + ry, cx - rx, cy + ry*1.1, cx - rx, cy);
}

// Get the y position on the top curve of the almond at a given x
function almondTopY(cx, cy, rx, ry, x) {
  const t = (x - cx) / rx; // -1 to 1
  const arcFactor = Math.sqrt(Math.max(0, 1 - t*t));
  return cy - ry * 0.85 * arcFactor;
}

// ── D3 MAP — pre-rendered to isolated offscreen canvas ──
const offscreen = document.createElement('canvas');
offscreen.width = S; offscreen.height = S;
const octx = offscreen.getContext('2d');
// D3 path generator bound ONLY to octx — never touches main ctx
const projection = d3.geoEquirectangular()
  .center([10, 10])
  .scale(S / (2 * Math.PI) * Math.PI * 0.92)
  .translate([S/2, S/2]);
const pathMaker = d3.geoPath().projection(projection).context(octx);

let mapReady = false;

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    octx.clearRect(0,0,S,S);
    const land = topojson.merge(world, world.objects.countries.geometries);
    const countries = topojson.feature(world, world.objects.countries);
    const desertIds = new Set(['012','788','434','729','706','682','784','512','887','400','048','414','364','036']);
    const iceIds = new Set(['304','010']);

    // Land base
    octx.beginPath(); pathMaker(land);
    octx.fillStyle='#4a9e6a'; octx.globalAlpha=0.88; octx.fill();
    octx.strokeStyle='#1a4028'; octx.lineWidth=0.7; octx.globalAlpha=0.45; octx.stroke();
    octx.globalAlpha=1;

    // Desert overlay
    countries.features
      .filter(f => desertIds.has(String(f.id).padStart(3,'0')))
      .forEach(f => {
        octx.beginPath(); pathMaker(f);
        octx.fillStyle='#c89040'; octx.globalAlpha=0.78; octx.fill();
        octx.globalAlpha=1;
      });

    // Ice
    countries.features
      .filter(f => iceIds.has(String(f.id).padStart(3,'0')))
      .forEach(f => {
        octx.beginPath(); pathMaker(f);
        octx.fillStyle='#d8eef8'; octx.globalAlpha=0.85; octx.fill();
        octx.globalAlpha=1;
      });

    mapReady = true;
  })
  .catch(() => { mapReady = true; });

// ── ANIMATION LOOP ────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = ts - last; last = ts;

  // Blink state machine
  if (blinkState === 'idle') {
    // stay at rest
  } else if (blinkState === 'closing') {
    blinkT += dt;
    lidProgress = Math.min(blinkT / BLINK_CLOSE, 1);
    if (blinkT >= BLINK_CLOSE) { blinkState = 'holding'; blinkT = 0; lidProgress = 1; }
  } else if (blinkState === 'holding') {
    blinkT += dt;
    if (blinkT >= BLINK_HOLD) { blinkState = 'opening'; blinkT = 0; }
  } else if (blinkState === 'opening') {
    blinkT += dt;
    lidProgress = 1 - Math.min(blinkT / BLINK_OPEN, 1);
    if (blinkT >= BLINK_OPEN) { blinkState = 'idle'; blinkT = 0; lidProgress = 0; }
  }

  ctx.clearRect(0,0,S,S);

  // Ocean
  const og=ctx.createRadialGradient(S*.38,S*.35,0,S*.5,S*.5,S*.7);
  og.addColorStop(0,'#1e5278');og.addColorStop(.3,'#0e3050');
  og.addColorStop(.65,'#071828');og.addColorStop(1,'#030e18');
  ctx.fillStyle=og;ctx.fillRect(0,0,S,S);

  // Continents — composite from isolated offscreen canvas
  if (mapReady) {
    ctx.drawImage(offscreen, 0, 0);
  }

  // Face — drawn once on top
  drawFace(lidProgress);

  // Circle mask
  ctx.globalCompositeOperation='destination-in';
  ctx.beginPath();ctx.arc(S/2,S/2,S/2,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.globalCompositeOperation='source-over';

  requestAnimationFrame(loop);
}

// Schedule blinks
function scheduleBlink() {
  setTimeout(() => {
    blinkState = 'closing'; blinkT = 0;
    scheduleBlink();
  }, 3000 + Math.random() * 5000);
}
scheduleBlink();

requestAnimationFrame(loop);

// ── UI ────────────────────────────────────────────────
const scene=document.getElementById('scene'),ov=document.getElementById('ov');
document.getElementById('pw').addEventListener('click',()=>{
  scene.style.opacity='0';scene.style.pointerEvents='none';
  setTimeout(()=>ov.classList.add('on'),500);
});
document.getElementById('bB').addEventListener('click',()=>{
  ov.classList.remove('on');
  setTimeout(()=>{scene.style.opacity='1';scene.style.pointerEvents='all';},400);
});
function goTo(msg){
  ov.style.transition='opacity .6s';ov.style.opacity='0';
  setTimeout(()=>{
    ov.innerHTML=`<div style="font-family:'Cinzel',serif;font-size:clamp(14px,2vw,20px);letter-spacing:.2em;color:rgba(255,255,255,.5);text-align:center;line-height:2.2;">${msg}<br><span style="font-family:'Cormorant Garamond',serif;font-size:.65em;font-style:italic;letter-spacing:.06em;">Domain map — coming next session</span></div>`;
    ov.style.opacity='1';
  },600);
}
document.getElementById('bJ').addEventListener('click',()=>goTo('The Journey Begins'));
document.getElementById('bE').addEventListener('click',()=>goTo('Explorer Mode'));
</script>
</body>
</html>
