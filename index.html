<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EoE TEST v99</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#020408;}
    canvas{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;}
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const S = Math.min(window.innerWidth, window.innerHeight) * 0.85;
c.width = S; c.height = S;
const ctx = c.getContext('2d');

// BLINK
let blink = 0; // 0=open, 1=closed
let dir = 1;
setInterval(() => {
  // Trigger a blink
  let t = 0;
  const interval = setInterval(() => {
    t += 16;
    if (t < 200) blink = t/200;
    else if (t < 300) blink = 1;
    else if (t < 500) blink = 1 - (t-300)/200;
    else { blink = 0; clearInterval(interval); }
  }, 16);
}, 4000);

function draw() {
  ctx.clearRect(0,0,S,S);

  // Ocean
  const g = ctx.createRadialGradient(S*.4,S*.35,0,S*.5,S*.5,S*.5);
  g.addColorStop(0,'#1e5278'); g.addColorStop(1,'#030e18');
  ctx.save();
  ctx.beginPath(); ctx.arc(S/2,S/2,S/2,0,Math.PI*2); ctx.clip();
  ctx.fillStyle=g; ctx.fillRect(0,0,S,S);

  // Draw exactly two eyes — nothing else
  drawEye(S*0.30, S*0.43);
  drawEye(S*0.70, S*0.43);

  // Mouth
  ctx.beginPath();
  ctx.moveTo(S*0.40, S*0.65);
  ctx.quadraticCurveTo(S*0.50, S*0.70, S*0.60, S*0.65);
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=S*0.006;
  ctx.lineCap='round'; ctx.stroke();

  ctx.restore();
  requestAnimationFrame(draw);
}

function drawEye(cx, cy) {
  const rx = S * 0.115;
  const ry = S * 0.065;
  const upperLid = ry * (0.28 + 0.72 * blink);
  const lowerLid = ry * (0.18 + 0.82 * blink);

  // Clip to almond
  ctx.save();
  ctx.beginPath();
  almondPath(cx, cy, rx, ry);
  ctx.clip();

  // White
  ctx.fillStyle = 'rgba(225,242,255,0.95)';
  ctx.fill();

  // Iris
  ctx.beginPath();
  ctx.arc(cx, cy + ry*0.1, ry*0.85, 0, Math.PI*2);
  const ig = ctx.createRadialGradient(cx-ry*0.3, cy-ry*0.3, 0, cx, cy, ry*0.85);
  ig.addColorStop(0,'rgba(240,250,255,0.98)');
  ig.addColorStop(0.5,'rgba(180,220,250,0.95)');
  ig.addColorStop(1,'rgba(80,150,200,0.90)');
  ctx.fillStyle=ig; ctx.fill();

  // Pupil
  ctx.beginPath();
  ctx.arc(cx, cy + ry*0.1, ry*0.42, 0, Math.PI*2);
  ctx.fillStyle='rgba(2,6,12,0.97)'; ctx.fill();

  // Highlight
  ctx.beginPath();
  ctx.arc(cx - ry*0.3, cy - ry*0.25, ry*0.18, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.fill();

  // Upper lid
  ctx.fillStyle='rgba(5,12,10,0.93)';
  ctx.fillRect(cx-rx-2, cy-ry-2, (rx+2)*2, upperLid + 2);

  // Lower lid
  ctx.fillStyle='rgba(5,12,10,0.80)';
  ctx.fillRect(cx-rx-2, cy+ry-lowerLid, (rx+2)*2, lowerLid+2);

  ctx.restore(); // end almond clip

  // Lashes (outside clip, above lid)
  const lidY = cy - ry + upperLid;
  for (let i = 0; i < 7; i++) {
    const t = i / 6;
    const lx = cx - rx*0.85 + t * rx*1.7;
    const angle = (-100 + t*40) * Math.PI/180;
    ctx.beginPath();
    ctx.moveTo(lx, lidY);
    ctx.lineTo(lx + Math.cos(angle)*ry*0.7, lidY + Math.sin(angle)*ry*0.7);
    ctx.strokeStyle=`rgba(5,12,10,${0.7-t*0.1})`;
    ctx.lineWidth=S*0.005; ctx.lineCap='round'; ctx.stroke();
  }

  // Brow
  ctx.beginPath();
  ctx.moveTo(cx-rx*1.1, cy-ry*1.8);
  ctx.quadraticCurveTo(cx, cy-ry*2.2, cx+rx*1.1, cy-ry*1.8);
  ctx.strokeStyle='rgba(5,12,10,0.30)'; ctx.lineWidth=S*0.018;
  ctx.lineCap='round'; ctx.stroke();
}

function almondPath(cx, cy, rx, ry) {
  ctx.moveTo(cx-rx, cy);
  ctx.bezierCurveTo(cx-rx, cy-ry*1.1, cx-rx*0.3, cy-ry, cx, cy-ry*0.85);
  ctx.bezierCurveTo(cx+rx*0.3, cy-ry, cx+rx, cy-ry*1.1, cx+rx, cy);
  ctx.bezierCurveTo(cx+rx, cy+ry*1.1, cx+rx*0.3, cy+ry, cx, cy+ry*0.85);
  ctx.bezierCurveTo(cx-rx*0.3, cy+ry, cx-rx, cy+ry*1.1, cx-rx, cy);
}

draw();
</script>
</body>
</html>
